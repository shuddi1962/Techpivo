name: Ingest Articles

on:
  # DISABLED: RSS ingestion is now handled by Supabase cron job
  # The Supabase cron triggers fetch-rss-feeds edge function daily at 6:00 AM
  # which fetches up to 20 posts and rewrites them using Gemini with Google Search Grounding
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Call ingest API
        run: |
          SITE="${{ secrets.SITE_URL || 'https://www.techpivo.com' }}"
          SECRET="${{ secrets.CRON_SECRET }}"
          if [ -n "$SECRET" ]; then
            curl -sL -o /dev/null -w "%{http_code}" -X POST "$SITE/api/ingest" \
              -H "Authorization: Bearer $SECRET"
          else
            curl -sL -o /dev/null -w "%{http_code}" -X POST "$SITE/api/ingest"
          fi
