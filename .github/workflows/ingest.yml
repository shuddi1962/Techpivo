name: Ingest Articles

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Call ingest API
        run: |
          SITE="${{ secrets.SITE_URL || 'https://www.blizine.com' }}"
          SECRET="${{ secrets.CRON_SECRET }}"
          if [ -n "$SECRET" ]; then
            curl -s -o /dev/null -w "%{http_code}" -X POST "$SITE/api/ingest" \
              -H "Authorization: Bearer $SECRET"
          else
            curl -s -o /dev/null -w "%{http_code}" -X POST "$SITE/api/ingest"
          fi
